    <!-- JavaScript -->
    <script>
        // 全局变量
        let currentPage = 1;
        let totalPages = 1;
        let searchTerm = '';
        let adminToken = localStorage.getItem('adminToken');
        let currentAdmin = JSON.parse(localStorage.getItem('currentAdmin'));

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            if (adminToken && currentAdmin) {
                showAdminDashboard();
            } else {
                showLoginSection();
            }

            // 绑定事件
            bindEvents();
        });

        // 绑定事件
        function bindEvents() {
            // 密码显示/隐藏
            const toggleAdminPassword = document.getElementById('toggle-admin-password');
            const adminPassword = document.getElementById('admin-password');
            if (toggleAdminPassword) {
                toggleAdminPassword.addEventListener('click', function() {
                    const type = adminPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                    adminPassword.setAttribute('type', type);
                    toggleAdminPassword.innerHTML = type === 'password' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
                });
            }

            const toggleCreatePassword = document.getElementById('toggle-create-password');
            const createPassword = document.getElementById('create-password');
            if (toggleCreatePassword) {
                toggleCreatePassword.addEventListener('click', function() {
                    const type = createPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                    createPassword.setAttribute('type', type);
                    toggleCreatePassword.innerHTML = type === 'password' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
                });
            }

            // 登录表单提交
            const adminLoginForm = document.getElementById('adminLoginForm');
            if (adminLoginForm) {
                adminLoginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('admin-username').value;
                    const password = document.getElementById('admin-password').value;
                    
                    if (!username || !password) {
                        alert('请输入用户名和密码');
                        return;
                    }
                    
                    try {
                        const response = await fetch('http://localhost:50000/api/users/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ username, password })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            // 检查是否是管理员
                            if (data.user.role === 'admin') {
                                // 存储管理员信息
                                localStorage.setItem('adminToken', data.token);
                                localStorage.setItem('currentAdmin', JSON.stringify(data.user));
                                adminToken = data.token;
                                currentAdmin = data.user;
                                
                                // 显示管理界面
                                showAdminDashboard();
                            } else {
                                alert('您不是管理员，没有权限访问此页面');
                            }
                        } else {
                            alert(data.error || '登录失败，请检查用户名和密码');
                        }
                    } catch (error) {
                        console.error('登录请求失败:', error);
                        alert('网络错误，请稍后重试');
                    }
                });
            }

            // 创建管理员表单提交
            const createAdminForm = document.getElementById('createAdminForm');
            if (createAdminForm) {
                createAdminForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('create-username').value;
                    const email = document.getElementById('create-email').value;
                    const password = document.getElementById('create-password').value;
                    const fullname = document.getElementById('create-fullname').value;
                    
                    if (!username || !email || !password) {
                        alert('请填写所有必填字段');
                        return;
                    }
                    
                    if (password.length < 8) {
                        alert('密码至少需要8位');
                        return;
                    }
                    
                    try {
                        const response = await fetch('http://localhost:50000/api/users/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ username, email, password, fullname })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            // 存储管理员信息
                            localStorage.setItem('adminToken', data.token);
                            localStorage.setItem('currentAdmin', JSON.stringify({ id: data.userId, username, email, fullname, role: 'admin' }));
                            adminToken = data.token;
                            currentAdmin = { id: data.userId, username, email, fullname, role: 'admin' };
                            
                            // 显示管理界面
                            showAdminDashboard();
                        } else {
                            alert(data.error || '创建管理员失败，请稍后重试');
                        }
                    } catch (error) {
                        console.error('创建管理员请求失败:', error);
                        alert('网络错误，请稍后重试');
                    }
                });
            }

            // 切换到创建管理员页面
            const createAdminBtn = document.getElementById('create-admin-btn');
            if (createAdminBtn) {
                createAdminBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    showCreateAdminSection();
                });
            }

            // 返回到登录页面
            const backToLoginBtn = document.getElementById('back-to-login-btn');
            if (backToLoginBtn) {
                backToLoginBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    showLoginSection();
                });
            }

            // 退出登录
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('currentAdmin');
                    adminToken = null;
                    currentAdmin = null;
                    showLoginSection();
                });
            }

            // 搜索用户
            const searchUsers = document.getElementById('search-users');
            if (searchUsers) {
                searchUsers.addEventListener('input', function() {
                    searchTerm = this.value;
                    currentPage = 1;
                    loadUsers();
                });
            }

            // 分页按钮
            const prevPageBtn = document.getElementById('prev-page');
            const nextPageBtn = document.getElementById('next-page');
            if (prevPageBtn && nextPageBtn) {
                prevPageBtn.addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        loadUsers();
                    }
                });

                nextPageBtn.addEventListener('click', function() {
                    if (currentPage < totalPages) {
                        currentPage++;
                        loadUsers();
                    }
                });
            }

            // 关闭模态框
            const closeModal = document.getElementById('close-modal');
            if (closeModal) {
                closeModal.addEventListener('click', function() {
                    document.getElementById('user-modal').classList.add('hidden');
                });
            }

            // 创建管理员相关事件
            const createAdminBtnDashboard = document.getElementById('create-admin-btn-dashboard');
            const createAdminModal = document.getElementById('create-admin-modal');
            const closeCreateAdminModal = document.getElementById('close-create-admin-modal');
            const cancelCreateAdmin = document.getElementById('cancel-create-admin');
            
            if (createAdminBtnDashboard) {
                createAdminBtnDashboard.addEventListener('click', function() {
                    createAdminModal.classList.remove('hidden');
                });
            }
            
            if (closeCreateAdminModal) {
                closeCreateAdminModal.addEventListener('click', function() {
                    createAdminModal.classList.add('hidden');
                });
            }
            
            if (cancelCreateAdmin) {
                cancelCreateAdmin.addEventListener('click', function() {
                    createAdminModal.classList.add('hidden');
                });
            }

            // 密码显示/隐藏
            const toggleDashboardCreatePassword = document.getElementById('toggle-dashboard-create-password');
            const dashboardCreatePassword = document.getElementById('dashboard-create-password');
            if (toggleDashboardCreatePassword) {
                toggleDashboardCreatePassword.addEventListener('click', function() {
                    const type = dashboardCreatePassword.getAttribute('type') === 'password' ? 'text' : 'password';
                    dashboardCreatePassword.setAttribute('type', type);
                    toggleDashboardCreatePassword.innerHTML = type === 'password' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
                });
            }

            // 创建管理员表单提交
            const createAdminFormDashboard = document.getElementById('createAdminFormDashboard');
            if (createAdminFormDashboard) {
                createAdminFormDashboard.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('dashboard-create-username').value;
                    const email = document.getElementById('dashboard-create-email').value;
                    const password = document.getElementById('dashboard-create-password').value;
                    const fullname = document.getElementById('dashboard-create-fullname').value;
                    
                    if (!username || !email || !password) {
                        alert('请填写所有必填字段');
                        return;
                    }
                    
                    if (password.length < 8) {
                        alert('密码至少需要8位');
                        return;
                    }
                    
                    try {
                        const response = await fetch('http://localhost:50000/api/users/admin/create', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${adminToken}`
                            },
                            body: JSON.stringify({ username, email, password, fullname })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            alert('管理员创建成功');
                            createAdminModal.classList.add('hidden');
                            // 重置表单
                            createAdminFormDashboard.reset();
                            // 重新加载用户列表
                            loadUsers();
                        } else {
                            alert(data.error || '创建管理员失败，请稍后重试');
                        }
                    } catch (error) {
                        console.error('创建管理员请求失败:', error);
                        alert('网络错误，请稍后重试');
                    }
                });
            }
        }

        // 显示登录区域
        function showLoginSection() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('create-admin-section').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
        }

        // 显示创建管理员区域
        function showCreateAdminSection() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('create-admin-section').classList.remove('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
        }

        // 显示管理员仪表板
        function showAdminDashboard() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('create-admin-section').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            
            // 更新管理员名称
            if (currentAdmin && document.getElementById('admin-name')) {
                document.getElementById('admin-name').textContent = currentAdmin.username || '管理员';
            }
            
            // 加载用户数据
            loadUsers();
        }

        // 加载用户数据
        async function loadUsers() {
            try {
                const response = await fetch(`http://localhost:50000/api/users/all?page=${currentPage}&limit=10&search=${encodeURIComponent(searchTerm)}`, {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    renderUsers(data.users);
                    updatePagination(data.pagination);
                } else {
                    alert(data.error || '加载用户数据失败');
                }
            } catch (error) {
                console.error('加载用户数据失败:', error);
                alert('网络错误，请稍后重试');
            }
        }

        // 渲染用户列表
        function renderUsers(users) {
            const tableBody = document.getElementById('users-table-body');
            
            if (users.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-10 text-center text-gray-500">
                            <i class="fa fa-user-o text-2xl mb-2 block"></i>
                            <p>没有找到用户数据</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tableBody.innerHTML = users.map(user => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${user.id}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                        ${user.username}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${user.email}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${user.fullname || '-'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${user.role === 'admin' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-800'}">
                            ${user.role === 'admin' ? '管理员' : '普通用户'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${new Date(user.created_at).toLocaleString()}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button class="text-primary hover:text-primary/80 mr-3" onclick="viewUserDetails(${user.id})"><i class="fa fa-eye"></i> 查看</button>
                        <button class="text-warning hover:text-warning/80 mr-3" onclick="changeUserRole(${user.id}, '${user.role}')"><i class="fa fa-user-circle"></i> 角色</button>
                        <button class="text-danger hover:text-danger/80" onclick="deleteUser(${user.id})"><i class="fa fa-trash"></i> 删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 更新分页信息
        function updatePagination(pagination) {
            currentPage = pagination.page;
            totalPages = pagination.totalPages;
            
            document.getElementById('showing-start').textContent = (pagination.page - 1) * pagination.limit + 1;
            document.getElementById('showing-end').textContent = Math.min(pagination.page * pagination.limit, pagination.total);
            document.getElementById('total-users').textContent = pagination.total;
            
            document.getElementById('prev-page').disabled = pagination.page === 1;
            document.getElementById('next-page').disabled = pagination.page === pagination.totalPages;
        }

        // 查看用户详情
        async function viewUserDetails(userId) {
            try {
                // 获取用户信息（使用管理员权限获取指定用户信息）
                const userResponse = await fetch(`http://localhost:50000/api/users/profile?userId=${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                
                const userData = await userResponse.json();
                
                // 获取用户分析历史（使用管理员权限获取指定用户的分析历史）
                const historyResponse = await fetch(`http://localhost:50000/api/analysis/records?userId=${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                
                const historyData = await historyResponse.json();
                
                if (userResponse.ok && historyResponse.ok) {
                    const modalContent = document.getElementById('modal-content');
                    modalContent.innerHTML = `
                        <div class="space-y-6">
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900 mb-4">用户基本信息</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <p class="text-sm text-gray-500">用户ID</p>
                                        <p class="text-sm font-medium text-gray-900">${userData.id}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">用户名</p>
                                        <p class="text-sm font-medium text-gray-900">${userData.username}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">邮箱</p>
                                        <p class="text-sm font-medium text-gray-900">${userData.email}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">姓名</p>
                                        <p class="text-sm font-medium text-gray-900">${userData.fullname || '-'}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">角色</p>
                                        <p class="text-sm font-medium text-gray-900">${userData.role === 'admin' ? '管理员' : '普通用户'}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">创建时间</p>
                                        <p class="text-sm font-medium text-gray-900">${new Date(userData.created_at).toLocaleString()}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div>
                                <h3 class="text-lg font-semibold text-gray-900 mb-4">分析历史</h3>
                                ${historyData.length > 0 ? `
                                    <div class="overflow-x-auto">
                                        <table class="min-w-full divide-y divide-gray-200">
                                            <thead class="bg-gray-50">
                                                <tr>
                                                    <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                        时间
                                                    </th>
                                                    <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                        分数
                                                    </th>
                                                    <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                        分析数据
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody class="bg-white divide-y divide-gray-200">
                                                ${historyData.map(item => `
                                                    <tr>
                                                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-500">
                                                            ${new Date(item.timestamp).toLocaleString()}
                                                        </td>
                                                        <td class="px-4 py-2 whitespace-nowrap text-sm font-medium text-gray-900">
                                                            ${item.score}
                                                        </td>
                                                        <td class="px-4 py-2 text-sm text-gray-500">
                                                            <pre class="whitespace-pre-wrap text-xs">${JSON.stringify(item.analysis_data, null, 2)}</pre>
                                                        </td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                ` : `
                                    <p class="text-sm text-gray-500">该用户暂无分析历史</p>
                                `}
                            </div>
                        </div>
                    `;
                    
                    document.getElementById('user-modal').classList.remove('hidden');
                } else {
                    alert('获取用户详情失败');
                }
            } catch (error) {
                console.error('获取用户详情失败:', error);
                alert('网络错误，请稍后重试');
            }
        }

        // 更改用户角色
        function changeUserRole(userId, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            if (confirm(`确定要将用户角色更改为${newRole === 'admin' ? '管理员' : '普通用户'}吗？`)) {
                changeRole(userId, newRole);
            }
        }

        // 执行角色更改
        async function changeRole(userId, role) {
            try {
                const response = await fetch(`http://localhost:50000/api/users/${userId}/role`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ role })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('用户角色更新成功');
                    loadUsers();
                } else {
                    alert(data.error || '角色更新失败');
                }
            } catch (error) {
                console.error('角色更新失败:', error);
                alert('网络错误，请稍后重试');
            }
        }

        // 删除用户
        function deleteUser(userId) {
            if (confirm('确定要删除该用户吗？此操作不可恢复，且会删除该用户的所有分析历史。')) {
                deleteUserById(userId);
            }
        }

        // 执行用户删除
        async function deleteUserById(userId) {
            try {
                const response = await fetch(`http://localhost:50000/api/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('用户删除成功');
                    loadUsers();
                } else {
                    alert(data.error || '用户删除失败');
                }
            } catch (error) {
                console.error('用户删除失败:', error);
                alert('网络错误，请稍后重试');
            }
        }
    </script>
</body>
</html>
