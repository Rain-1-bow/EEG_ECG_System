<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript错误检查器</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        #error-container {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .error {
            color: red;
            margin-bottom: 10px;
            padding: 10px;
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        .log {
            color: #333;
            margin-bottom: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
        #user-center-content {
            display: none;
        }
    </style>
</head>
<body>
    <h1>JavaScript错误检查器</h1>
    <button onclick="loadUserCenterCode()">加载并检查user_center.html代码</button>
    <div id="error-container">
        <div class="log">点击上方按钮开始检查...</div>
    </div>
    
    <!-- 隐藏的div用于存储user_center.html内容 -->
    <div id="user-center-content"></div>
    
    <script>
        // 重写console方法以捕获所有日志
        const originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn,
            debug: console.debug
        };
        
        const errorContainer = document.getElementById('error-container');
        
        console.log = function(...args) {
            addLog('log', args);
            originalConsole.log(...args);
        };
        
        console.error = function(...args) {
            addLog('error', args);
            originalConsole.error(...args);
        };
        
        console.warn = function(...args) {
            addLog('warn', args);
            originalConsole.warn(...args);
        };
        
        function addLog(type, args) {
            const logElement = document.createElement('div');
            logElement.className = type;
            
            if (type === 'error') {
                logElement.innerHTML = `<strong>错误:</strong> ${args.map(arg => 
                    typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                ).join(' ')}`;
            } else {
                logElement.textContent = `${type.toUpperCase()}: ${args.join(' ')}`;
            }
            
            errorContainer.appendChild(logElement);
            errorContainer.scrollTop = errorContainer.scrollHeight;
        }
        
        // 捕获全局错误
        window.onerror = function(message, source, lineno, colno, error) {
            const errorElement = document.createElement('div');
            errorElement.className = 'error';
            errorElement.innerHTML = `
                <strong>全局错误:</strong> ${message}<br>
                <strong>文件:</strong> ${source}<br>
                <strong>行号:</strong> ${lineno}, <strong>列号:</strong> ${colno}<br>
                <strong>错误对象:</strong> ${error ? error.stack : '无'}
            `;
            errorContainer.appendChild(errorElement);
            return true;
        };
        
        window.addEventListener('unhandledrejection', function(event) {
            const errorElement = document.createElement('div');
            errorElement.className = 'error';
            errorElement.innerHTML = `
                <strong>未处理的Promise拒绝:</strong> ${event.reason}<br>
                <strong>Promise:</strong> ${event.promise}
            `;
            errorContainer.appendChild(errorElement);
        });
        
        // 加载user_center.html内容
        async function loadUserCenterCode() {
            try {
                // 这里我们直接提取updateStatistics函数进行测试，而不是加载整个文件
                console.log('开始测试updateStatistics函数...');
                
                // 模拟必要的环境
                window.unifiedSyncManager = { 
                    getAllAnalysisHistory: function() { 
                        console.log('unifiedSyncManager调用成功');
                        return []; 
                    } 
                };
                
                localStorage.setItem('currentUser', JSON.stringify({ id: 'test', username: 'testuser' }));
                
                // 直接测试updateStatistics函数（从之前的分析中提取关键部分）
                async function testUpdateStatistics() {
                    try {
                        // 这里我们只测试函数的结构，不执行实际的DOM操作
                        console.log('updateStatistics函数测试开始');
                        
                        // 模拟函数的核心逻辑结构
                        let currentUserId = null;
                        try {
                            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
                            currentUserId = currentUser.id || currentUser.userId || currentUser.user_id || currentUser.username || currentUser.name;
                            console.log('成功获取用户ID:', currentUserId);
                        } catch (e) {
                            console.error('获取用户ID失败:', e);
                        }
                        
                        // 测试数组方法
                        const testArray = [];
                        const filtered = testArray.filter(item => item && item.score > 70);
                        console.log('数组过滤测试通过');
                        
                        // 测试日期方法
                        const date = new Date();
                        const month = date.getMonth();
                        const year = date.getFullYear();
                        console.log('日期测试通过，月/年:', month, '/', year);
                        
                        console.log('updateStatistics函数结构测试通过！');
                        return 'success';
                    } catch (error) {
                        console.error('updateStatistics函数测试失败:', error);
                        return 'error';
                    }
                }
                
                // 执行测试
                const result = await testUpdateStatistics();
                console.log('测试完成，结果:', result);
                
                // 测试常见的语法问题
                testCommonSyntaxIssues();
                
            } catch (e) {
                console.error('加载测试失败:', e);
            }
        }
        
        // 测试常见的语法问题
        function testCommonSyntaxIssues() {
            console.log('测试常见语法问题...');
            
            try {
                // 测试JSON.parse错误处理
                JSON.parse('{invalid json}');
            } catch (e) {
                console.log('正确捕获了JSON.parse错误:', e.message);
            }
            
            try {
                // 测试数组访问错误
                const arr = [];
                console.log(arr[100].property);
            } catch (e) {
                console.log('正确捕获了数组访问错误:', e.message);
            }
            
            try {
                // 测试类型错误
                const num = 123;
                num.toLowerCase();
            } catch (e) {
                console.log('正确捕获了类型错误:', e.message);
            }
        }
    </script>
</body>
</html>
