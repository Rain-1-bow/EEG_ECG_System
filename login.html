    <style>

        .text-shadow-lg { text-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }

                            <!-- 登录表单 -->
                            <div id="login-form" class="tab-content">
                                <h3 class="text-2xl font-bold text-dark mb-6">登录您的账号</h3>
                                <form id="loginForm" class="space-y-6">

                                            </div>
                                            <input type="email" id="login-email" name="email" class="form-input w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="请输入您的邮箱" required>
                                        </div>
                                    </div>
                                    <div>
                                        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <i class="fa fa-lock text-gray-400"></i>
                                            </div>
                                            <input type="password" id="login-password" name="password" class="form-input w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="请输入您的密码" required>
                                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                                <button type="button" id="toggle-login-password" class="text-gray-400 hover:text-gray-600">
                                                    <i class="fa fa-eye-slash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center">
                                            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">记住我</label>
                                        </div>
                                        <div class="text-sm">
                                            <a href="#" class="font-medium text-primary hover:text-primary/80">忘记密码?</a>
                                        </div>
                                    </div>
                                    <div>
                                        <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary hover:opacity-90 text-white px-6 py-3.5 rounded-lg font-semibold transition-all shadow-lg shadow-primary/20">
                                            登录
                                        </button>
                                    </div>
                                </form>
                            </div>
                            
                            <!-- 注册表单 -->
                            <div id="register-form" class="tab-content hidden">
                                <h3 class="text-2xl font-bold text-dark mb-6">创建新账号</h3>
                                <form id="registerForm" class="space-y-6">
                                    <div>
                                        <label for="register-name" class="block text-sm font-medium text-gray-700 mb-2">姓名</label>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <i class="fa fa-user text-gray-400"></i>
                                            </div>
                                            <input type="text" id="register-name" name="name" class="form-input w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="请输入您的姓名" required>
                                        </div>
                                    </div>
                                    <div>
                                        <label for="register-email" class="block text-sm font-medium text-gray-700 mb-2">邮箱</label>
                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <i class="fa fa-envelope text-gray-400"></i>
                                            </div>
                                            <input type="email" id="register-email" name="email" class="form-input w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="请输入您的邮箱" required>
                                        </div>
                                    </div>
                                    <div>
                                        <label for="register-password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>

                                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">

                                                </button>
                                            </div>
                                        </div>

                                    </div>

                                        <div class="relative">
                                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                <i class="fa fa-lock text-gray-400"></i>
                                            </div>
                                            <input type="password" id="register-confirm-password" name="confirm-password" class="form-input w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="请再次输入密码" required>
                                        </div>
                                    </div>
                                    <div class="flex items-center">
                                        <input id="agree-terms" name="agree-terms" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" required>
                                        <label for="agree-terms" class="ml-2 block text-sm text-gray-700">我同意<a href="#" class="text-primary hover:underline">隐私政策</a>和<a href="#" class="text-primary hover:underline">使用条款</a></label>
                                    </div>
                                    <div>
                                        <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary hover:opacity-90 text-white px-6 py-3.5 rounded-lg font-semibold transition-all shadow-lg shadow-primary/20">
                                            注册
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <!-- 页脚 -->

    <!-- JavaScript -->
    <script>
        // 移动端菜单切换
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
        
        // 登录/注册选项卡切换
        const loginTab = document.getElementById('login-tab');
        const registerTab = document.getElementById('register-tab');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            loginTab.classList.remove('text-gray-500');
            registerTab.classList.add('text-gray-500');
            registerTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });
        
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            registerTab.classList.remove('text-gray-500');
            loginTab.classList.add('text-gray-500');
            loginTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });
        
        // 密码显示/隐藏切换
        const toggleLoginPassword = document.getElementById('toggle-login-password');
        const loginPassword = document.getElementById('login-password');
        
        toggleLoginPassword.addEventListener('click', () => {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            toggleLoginPassword.innerHTML = type === 'password' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
        });
        
        const toggleRegisterPassword = document.getElementById('toggle-register-password');
        const registerPassword = document.getElementById('register-password');
        
        toggleRegisterPassword.addEventListener('click', () => {
            const type = registerPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            registerPassword.setAttribute('type', type);
            toggleRegisterPassword.innerHTML = type === 'password' ? '<i class="fa fa-eye-slash"></i>' : '<i class="fa fa-eye"></i>';
        });
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            
            // 表单验证
            if (!email || !password) {
                alert('请输入邮箱和密码');
                return;
            }
            
            try {
                // 调用服务器登录API
                const response = await fetch('http://localhost:50000/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 存储用户信息到localStorage
                    const userCredentials = {
                        id: data.user.id,
                        name: data.user.fullname || data.user.username,
                        email: data.user.email,
                        role: data.user.role,
                        loggedIn: true
                    };
                    localStorage.setItem('userCredentials', JSON.stringify(userCredentials));
                    localStorage.setItem('userLoggedIn', 'true');
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('token', data.token);
                    
                    if (rememberMe) {
                        localStorage.setItem('savedCredentials', JSON.stringify(userCredentials));
                    }
                    
                    // 显示登录成功提示
                    alert('登录成功！');
                    
                    // 跳转到分析页面
                    window.location.href = 'analysis.html';
                } else {
                    // 显示登录失败提示
                    alert(data.error || '登录失败，请检查邮箱和密码');
                }
            } catch (error) {
                console.error('登录请求失败:', error);
                alert('网络错误，请稍后重试');
            }
        });
        
        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const agreeTerms = document.getElementById('agree-terms').checked;
            
            // 表单验证
            if (!name || !email || !password || !confirmPassword) {
                alert('请填写所有必填字段');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (password.length < 8) {
                alert('密码至少需要8位');
                return;
            }
            
            if (!agreeTerms) {
                alert('请同意隐私政策和使用条款');
                return;
            }
            
            try {
                // 调用服务器注册API
                const response = await fetch('http://localhost:50000/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: email, email, password, fullname: name })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 存储用户信息到localStorage
                    const userCredentials = {
                        id: data.userId,
                        name: name,
                        email: email,
                        loggedIn: true
                    };
                    localStorage.setItem('userCredentials', JSON.stringify(userCredentials));
                    localStorage.setItem('userLoggedIn', 'true');
                    localStorage.setItem('token', data.token);
                    
                    // 显示注册成功提示
                    alert('注册成功！');
                    
                    // 跳转到分析页面
                    window.location.href = 'analysis.html';
                } else {
                    // 显示注册失败提示
                    alert(data.error || '注册失败，请稍后重试');
                }
            } catch (error) {
                console.error('注册请求失败:', error);
                alert('网络错误，请稍后重试');
            }
        });
    </script>
